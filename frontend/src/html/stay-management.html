<!DOCTYPE html>
<html lang="uk">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Stay Management - E-Hotel</title>
	<link rel="stylesheet" href="/src/css/style.css">
	<script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
	<div class="layout-wrapper">
		<div id="sidebar-container"></div>

		<div class="dashboard-container">
			<header class="header">
				<h2 class="title">Stay Management & Billing</h2>
				<p class="subtitle">Manage current stays and view history</p>
			</header>

			<div class="card mb-6">
				<div class="form-group" style="position: relative;">
					<input type="text" id="stay-search" class="form-input" style="padding-left: 40px;" placeholder="Search by code or guest...">
				</div>
			</div>

			<div class="card mb-6">
				<div class="results-header">
					<h3 id="active-title">Active Bookings</h3>
				</div>
				<div style="overflow-x: auto;">
					<table class="management-table">
						<thead>
							<tr>
								<th>Code</th>
								<th>Guest</th>
								<th>Hotel</th>
								<th>Room</th>
								<th>Check-In</th>
								<th>Check-Out</th>
								<th>Status</th>
								<th style="text-align: right;">Actions</th>
							</tr>
						</thead>
						<tbody id="active-table-body"></tbody>
					</table>
				</div>
			</div>

			<div class="card">
				<div class="results-header">
					<h3 id="past-title">Past Bookings</h3>
				</div>
				<div style="overflow-x: auto;">
					<table class="management-table">
						<thead>
							<tr>
								<th>Code</th>
								<th>Guest</th>
								<th>Hotel</th>
								<th>Room</th>
								<th>Check-In</th>
								<th>Check-Out</th>
								<th>Status</th>
							</tr>
						</thead>
						<tbody id="past-table-body"></tbody>
					</table>
				</div>
			</div>
		</div>
	</div>

	<div id="details-modal" class="modal-overlay">
		<div class="card" style="width: 480px;">
			<div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
				<h3 id="details-code" class="text-blue-600">Booking Details</h3>
				<button onclick="closeDetailsModal()" class="btn btn-ghost" style="padding: 5px;">✕</button>
			</div>
			<div id="details-content"></div>
			
			<div id="cancel-section" style="margin-top: 20px; padding-top: 15px; border-top: 1px solid #eee; display: none;">
				<p id="cancel-warning" style="font-size: 0.75rem; color: #ea580c; margin-bottom: 10px;"></p>
				
				<div id="cancel-btn-container" style="display: flex; flex-direction: column; gap: 10px;">
					<button id="cancel-booking-btn" class="btn btn-outline" style="width: 100%; border-color: #ef4444; color: #ef4444; justify-content: center;">
						Cancel Reservation
					</button>
					
					<button id="invalid-booking-btn" class="btn btn-outline" style="width: 100%; border-color: #9ca3af; color: #4b5563; justify-content: center;">
						Mark as Invalid
					</button>
				</div>
			</div>
		</div>
	</div>

	<div id="extend-modal" class="modal-overlay" style="display: none;">
		<div class="card" style="width: 400px; padding: 20px;">
			<h3 style="margin-bottom: 20px;">Extand Stay</h3>
			<div class="form-group mb-6">
				<label style="display: block; margin-bottom: 8px;">New Check out date</label>
				<input type="date" id="new-checkout-date" class="form-input" style="width: 100%; padding: 8px; border-radius: 6px; border: 1px solid #ddd;">
				
				<div id="extend-price-info" style="margin-top: 10px;"></div>
			</div>
			<div style="display: flex; gap: 10px; margin-top: 20px;">
				<button onclick="closeExtendModal()" class="btn btn-outline" style="flex: 1;">Cancel</button>
				<button id="confirm-extend-btn" class="btn btn-primary" style="flex: 1;">Approve</button>
			</div>
		</div>
	</div>

	<script type="module" src="/src/js/load-sidebar.js"></script>
	<script  type="module" src="/src/js/stay-management.js"></script>
</body>
</html>
